<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phishing URL Detector</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface-light: #f8fafc;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --safe: #22c55e;
      --safe-bg: #f0fdf4;
      --warning: #f59e0b;
      --warning-bg: #fffbeb;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --primary: #2563eb;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { width: 340px; padding: 0; background: var(--bg); color: var(--text-main); }
    
    /* Header */
    .header { 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 14px 16px; 
      background: var(--surface-light); 
      border-bottom: 1px solid var(--border); 
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header h3 { font-size: 15px; font-weight: 700; color: var(--text-main); }
    
    .settings-btn { 
      background: none; 
      border: none; 
      cursor: pointer; 
      font-size: 18px; 
      color: var(--text-muted); 
      transition: .2s; 
      border-radius: 6px; 
      padding: 4px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    .settings-btn:hover { background: #e2e8f0; color: var(--text-main); transform: rotate(30deg); }
    
    /* Main Content */
    .content { padding: 16px; }
    
    #url-display { 
      font-size: 11px; 
      color: var(--text-muted); 
      word-break: break-all; 
      background: var(--surface-light); 
      border: 1px solid var(--border); 
      border-radius: 8px; 
      padding: 10px; 
      margin-bottom: 16px; 
      max-height: 52px; 
      overflow: hidden; 
      display: -webkit-box; 
      -webkit-line-clamp: 2; 
      -webkit-box-orient: vertical; 
      line-height: 1.4;
    }
    
    #result { 
      padding: 20px 16px; 
      border-radius: 12px; 
      text-align: center; 
      font-weight: 800; 
      font-size: 16px; 
      letter-spacing: 0.5px; 
      border: 2px solid transparent; 
      margin-bottom: 16px; 
      display: flex; 
      flex-direction: column; 
      gap: 6px; 
      align-items: center; 
      transition: .3s;
    }
    #result .icon { font-size: 28px; }
    
    #result.loading  { background: var(--surface-light); color: var(--text-muted); border-color: var(--border); }
    #result.safe     { background: var(--safe-bg); color: var(--safe); border-color: #bbf7d0; box-shadow: 0 4px 6px -1px rgba(34,197,94,0.1); }
    #result.warning  { background: var(--warning-bg); color: var(--warning); border-color: #fde68a; box-shadow: 0 4px 6px -1px rgba(245,158,11,0.1); }
    #result.danger   { background: var(--danger-bg); color: var(--danger); border-color: #fecaca; box-shadow: 0 4px 6px -1px rgba(239,68,68,0.1); }
    #result.error    { background: var(--surface-light); color: var(--danger); border-color: var(--danger); }
    
    #prob-bar-wrap { margin-bottom: 20px; display: none; }
    #prob-bar-wrap label { 
      font-size: 12px; 
      font-weight: 700; 
      color: var(--text-main); 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 8px; 
    }
    #prob-bar-bg { background: var(--border); border-radius: 10px; height: 10px; overflow: hidden; }
    #prob-bar { height: 10px; border-radius: 10px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    
    #reasons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .reason-badge { 
      font-size: 12px; 
      background: #f1f5f9; 
      border: 1px solid var(--border); 
      padding: 8px 12px; 
      border-radius: 8px; 
      color: var(--text-main); 
      display: flex; 
      align-items: flex-start; 
      gap: 8px; 
      line-height: 1.5; 
      font-weight: 500;
    }
    .reason-badge::before { content: "•"; color: var(--primary); font-weight: 900; }
    
    .footer { 
      padding: 12px; 
      font-size: 10px; 
      color: #94a3b8; 
      text-align: center; 
      background: var(--surface-light); 
      border-top: 1px solid var(--border); 
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span style="font-size:20px">🛡️</span>
      <h3>Phishing Detector</h3>
    </div>
    <button id="settings-btn" class="settings-btn" title="Cài đặt hệ thống">⚙️</button>
  </div>

  <div class="content">
    <div id="url-display">Đang lấy dữ liệu tab...</div>
    
    <div id="result" class="loading">
      <div class="icon">⏳</div>
      <div>Đang phân tích URL...</div>
    </div>
    
    <div id="prob-bar-wrap">
      <label>
        <span>Xác suất nguy hiểm:</span>
        <span id="prob-label">0%</span>
      </label>
      <div id="prob-bar-bg">
        <div id="prob-bar" style="width:0%; background:var(--safe)"></div>
      </div>
    </div>
    
    <div id="reasons"></div>
  </div>

  <div class="footer">XGBoost Engine · Real-time Analysis</div>

  <!-- Nạp scripts theo thứ tự -->
  <script src="feature_extractor.js"></script>
  <script src="xgboost_predictor.js"></script>
  <script src="popup.js"></script>
</body>
</html>
